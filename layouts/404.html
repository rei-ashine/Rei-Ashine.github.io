{{ define "main" }}
  <div class="error-404" style="text-align: center; margin-top: 4rem;">
    <h1 class="error-404-title" style="font-size: 3rem; margin-bottom: 1rem;">404</h1>
    <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">Page Not Found</h2>
    <p style="margin-bottom: 2rem;">The page you are looking for doesn't exist or has been moved.</p>
    <a href="{{ "/" | relURL }}" style="display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; background-color: {{ .Site.Params.style.primaryColor | default "#f8b500" }}; color: {{ .Site.Params.style.lightColor | default "#0d0015" }}; text-decoration: none; border-radius: 5px; font-weight: bold; transition: opacity 0.3s;">
      {{ partial "icon.html" (dict "ctx" $ "name" "arrow-left") }} &nbsp; Return to Home
    </a>
  </div>
{{ end }}
